name: CI Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: teste
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          extensions: mbstring, bcmath, pdo_pgsql

      - name: Composer install
        run: |
          cd livros-api
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configurar .env
        run: |
          cp livros-api/.env.example livros-api/.env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' livros-api/.env
          sed -i 's/DB_HOST=.*/DB_HOST=postgres/' livros-api/.env
          sed -i 's/DB_PORT=.*/DB_PORT=5432/' livros-api/.env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=teste/' livros-api/.env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=postgres/' livros-api/.env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' livros-api/.env

      - name: Limpar cache Laravel
        run: |
          cd livros-api
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

      - name: Rodar migrations
        run: |
          cd livros-api
          php artisan migrate:fresh --seed

      - name: Rodar testes Laravel
        run: |
          cd livros-api
          php artisan test --parallel --stop-on-failure