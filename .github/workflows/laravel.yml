name: CI Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_DB: teste
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          extensions: mbstring, bcmath, pdo_pgsql

      - name: Composer install
        run: |
          cd livros-api
          composer install

      - name: Verificar .env final
        run: cat livros-api/.env

      - name: Limpar cache de configuração
        run: |
          cd livros-api
          php artisan config:clear

      - name: Rodar migrations
        run: |
          cd livros-api
          php artisan migrate --force

      - name: Rodar testes Laravel
        run: |
          cd livros-api
          php artisan test